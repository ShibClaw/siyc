<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiba Inu Yacht Club - NFT Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.0/ethers.umd.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .nft-card { transition: transform 0.2s, box-shadow 0.2s; }
        .nft-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="border-b border-gray-800 bg-gray-900/80 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center font-bold text-white">S</div>
                <h1 class="text-xl font-bold text-white tracking-tight">Shiba Inu Yacht Club</h1>
            </div>
            <button id="connectBtn" onclick="connectWallet()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                Connect Wallet
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- Dashboard -->
        <div id="dashboard" class="hidden mb-8 glass-panel rounded-2xl p-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <p class="text-gray-400 text-sm mb-1">Connected Address</p>
                    <p id="walletAddress" class="text-lg font-mono text-indigo-400 break-all">0x...</p>
                </div>
                <div class="flex items-center gap-6">
                    <div class="text-center md:text-right">
                        <p class="text-gray-400 text-sm mb-1">Your NFTs</p>
                        <p id="nftCount" class="text-3xl font-bold text-white">0</p>
                    </div>
                    <button onclick="loadNFTs(document.getElementById('walletAddress').innerText)" class="bg-gray-700 hover:bg-gray-600 text-white p-3 rounded-lg transition-colors" title="Refresh">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- NFT Gallery -->
        <div id="gallerySection" class="hidden">
            <h2 class="text-2xl font-bold text-white mb-6">Your Collection</h2>
            <div id="nftGallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- NFT Cards will be injected here -->
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-gray-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            <p class="text-gray-400 text-lg">No NFTs found in this wallet.</p>
        </div>

        <!-- Welcome State -->
        <div id="welcomeState" class="text-center py-20">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 mx-auto text-indigo-500 mb-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            <h2 class="text-3xl font-bold text-white mb-2">Welcome to SIYC Gallery</h2>
            <p class="text-gray-400 mb-8">Connect your Web3 wallet to view and manage your Shiba Inu Yacht Club NFTs.</p>
            <button onclick="connectWallet()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl transition-colors text-lg">
                Connect Wallet
            </button>
        </div>
    </main>

    <!-- Transfer Modal -->
    <div id="transferModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
        <div class="glass-panel rounded-2xl p-6 w-full max-w-md relative">
            <button onclick="closeTransferModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <h3 class="text-xl font-bold text-white mb-4">Transfer NFT</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">NFT ID</label>
                    <input type="text" id="transferNftId" readonly class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white font-mono">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Recipient Address</label>
                    <input type="text" id="transferToAddress" placeholder="0x..." class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                
                <p id="transferStatus" class="text-sm mt-2"></p>

                <button onclick="executeTransfer()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition-colors mt-2">
                    Confirm Transfer
                </button>
            </div>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0x30B6A87ef74bA0D66440b2797D2e3175CA37f0F1";
        const CONTRACT_ABI = [
            "function ownerNFTCount(address owner) view returns (uint256)",
            "function ownerNFTsPage(address owner, uint256 page, uint256 pageSize) view returns (tuple(uint256 id, uint256 seed)[])",
            "function tokenURI(uint256 nftId) view returns (string)",
            "function transferNFT(address to, uint256 nftId)"
        ];

        let provider, signer, contract;

        async function connectWallet() {
            if (!window.ethereum) { 
                alert("Please install MetaMask or another Web3 wallet!"); 
                return; 
            }
            
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                const address = await signer.getAddress();
                
                contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                
                document.getElementById('walletAddress').innerText = address;
                document.getElementById('connectBtn').innerHTML = `<span class="w-2 h-2 bg-green-400 rounded-full"></span> Connected`;
                document.getElementById('connectBtn').classList.replace('bg-indigo-600', 'bg-gray-700');
                document.getElementById('connectBtn').classList.replace('hover:bg-indigo-700', 'hover:bg-gray-600');
                
                document.getElementById('welcomeState').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('gallerySection').classList.remove('hidden');
                
                await loadNFTs(address);
            } catch (error) {
                console.error("Connection failed:", error);
                alert("Failed to connect wallet. Please try again.");
            }
        }

        async function loadNFTs(address) {
            const gallery = document.getElementById('nftGallery');
            gallery.innerHTML = '<div class="col-span-full text-center py-10"><div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-indigo-500"></div><p class="mt-2 text-gray-400">Loading your NFTs...</p></div>';
            
            try {
                const count = await contract.ownerNFTCount(address);
                document.getElementById('nftCount').innerText = count.toString();
                
                if (count == 0) {
                    gallery.innerHTML = '';
                    document.getElementById('emptyState').classList.remove('hidden');
                    document.getElementById('gallerySection').classList.add('hidden');
                    return;
                }
                
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('gallerySection').classList.remove('hidden');
                gallery.innerHTML = ''; // Clear loading

                // Fetch up to 50 NFTs
                const nfts = await contract.ownerNFTsPage(address, 0, 50);
                
                for (const nft of nfts) {
                    const nftId = nft.id.toString();
                    let imageUrl = "https://via.placeholder.com/300x300/1e293b/64748b?text=Loading...";
                    let name = `SIYC #${nftId}`;
                    
                    try {
                        const uri = await contract.tokenURI(nftId);
                        if (uri && uri.startsWith("data:application/json;base64,")) {
                            const base64Data = uri.split(',')[1];
                            const jsonStr = atob(base64Data);
                            const metadata = JSON.parse(jsonStr);
                            name = metadata.name || name;
                            imageUrl = metadata.image || imageUrl;
                        }
                    } catch (err) {
                        console.warn(`Metadata not available for NFT ${nftId}. (Is MetadataStorage set?)`);
                        imageUrl = "https://via.placeholder.com/300x300/1e293b/ef4444?text=Metadata+Not+Set";
                    }

                    const card = document.createElement('div');
                    card.className = "nft-card glass-panel rounded-xl overflow-hidden flex flex-col";
                    card.innerHTML = `
                        <div class="aspect-square bg-gray-800 flex items-center justify-center relative group">
                            <img src="${imageUrl}" alt="${name}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x300/1e293b/64748b?text=Image+Error'">
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="text-lg font-bold text-white mb-1 truncate">${name}</h3>
                            <p class="text-sm text-gray-400 mb-4 font-mono">ID: ${nftId}</p>
                            <button onclick="openTransferModal('${nftId}')" class="mt-auto w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
                                Transfer
                            </button>
                        </div>
                    `;
                    gallery.appendChild(card);
                }
            } catch (error) {
                console.error("Error loading NFTs:", error);
                gallery.innerHTML = `<div class="col-span-full text-center py-10 text-red-400">
                    <p class="font-bold mb-2">Failed to load NFTs</p>
                    <p class="text-sm text-gray-400">Make sure the contract is correctly deployed and you are on the BSC network.</p>
                </div>`;
            }
        }

        function openTransferModal(nftId) {
            document.getElementById('transferNftId').value = nftId;
            document.getElementById('transferToAddress').value = '';
            document.getElementById('transferStatus').innerText = '';
            document.getElementById('transferModal').classList.remove('hidden');
        }

        function closeTransferModal() {
            document.getElementById('transferModal').classList.add('hidden');
        }

        async function executeTransfer() {
            const nftId = document.getElementById('transferNftId').value;
            const toAddress = document.getElementById('transferToAddress').value.trim();
            const statusEl = document.getElementById('transferStatus');
            
            if (!ethers.isAddress(toAddress)) {
                statusEl.innerText = "Error: Invalid Ethereum address.";
                statusEl.className = "text-sm text-red-400 mt-2";
                return;
            }

            statusEl.innerText = "Please confirm the transaction in your wallet...";
            statusEl.className = "text-sm text-yellow-400 mt-2";

            try {
                const tx = await contract.transferNFT(toAddress, nftId);
                statusEl.innerText = "Transaction sent! Waiting for block confirmation...";
                
                const receipt = await tx.wait();
                statusEl.innerText = "Transfer successful!";
                statusEl.className = "text-sm text-green-400 mt-2";
                
                setTimeout(() => {
                    closeTransferModal();
                    const address = document.getElementById('walletAddress').innerText;
                    loadNFTs(address);
                }, 2000);
            } catch (error) {
                console.error("Transfer failed:", error);
                let errorMsg = "Transfer failed.";
                if (error.reason) errorMsg += " Reason: " + error.reason;
                else if (error.message) errorMsg += " " + error.message;
                
                statusEl.innerText = errorMsg;
                statusEl.className = "text-sm text-red-400 mt-2";
            }
        }

        // Listen for account changes
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length === 0) {
                    window.location.reload();
                } else {
                    window.location.reload();
                }
            });
            window.ethereum.on('chainChanged', () => {
                window.location.reload();
            });
        }
    </script>
</body>
</html>
