<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIYC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.0/ethers.umd.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .nft-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }
        .nft-card:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3);
        }
        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 py-6">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold text-xl text-white">S</div>
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                    SIYC
                </h1>
            </div>
            <button id="connectBtn" onclick="connectWallet()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" />
                </svg>
                <span id="connectText">Connect Wallet</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8">
        
        <!-- Status Message -->
        <div id="statusMessage" class="hidden mb-6 p-4 rounded-lg bg-slate-800 border border-slate-700 text-center">
            <p id="statusText" class="text-slate-300"></p>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-slate-400">Loading your NFT data from the blockchain...</p>
        </div>

        <!-- NFT Grid -->
        <div id="nftGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- NFT Cards will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-slate-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <p class="text-xl">No SIYC NFTs found</p>
            <p class="text-sm mt-2">Purchase SIYC tokens on PancakeSwap to dynamically mint NFTs.</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 border-t border-slate-800 py-6 text-center text-slate-500 text-sm">
        <p>SIYC &copy; 2026</p>
        <p class="mt-1">Contract: <span class="font-mono text-slate-400">0xF09f80bB589be98C67521CB3Ac955b1faD17F157</span></p>
    </footer>

    <script>
        const CONTRACT_ADDRESS = "0xF09f80bB589be98C67521CB3Ac955b1faD17F157";
        const CHAIN_ID = 56;
        
        const ABI = [
            "function ownerNFTCount(address owner) view returns (uint256)",
            "function ownerNFT(address owner, uint256 index) view returns (uint256 nftId, uint256 seed)",
            "function tokenURI(uint256 nftId) view returns (string)"
        ];

        let provider;
        let signer;
        let contract;

        async function connectWallet() {
            const statusDiv = document.getElementById('statusMessage');
            const statusText = document.getElementById('statusText');
            
            if (typeof window.ethereum === 'undefined') {
                showStatus('Please install MetaMask or another Web3 wallet!', 'error');
                return;
            }

            try {
                showStatus('Connecting wallet...', 'info');
                provider = new ethers.BrowserProvider(window.ethereum);
                
                const accounts = await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                const address = await signer.getAddress();
                
                const network = await provider.getNetwork();
                if (Number(network.chainId) !== CHAIN_ID) {
                    showStatus(`Please switch your wallet network to BSC Mainnet (Chain ID: ${CHAIN_ID})`, 'error');
                    return;
                }

                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
                
                document.getElementById('connectText').innerText = `${address.slice(0, 6)}...${address.slice(-4)}`;
                document.getElementById('connectBtn').classList.replace('bg-blue-600', 'bg-green-600');
                document.getElementById('connectBtn').classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
                
                hideStatus();
                await loadNFTs(address);

            } catch (error) {
                console.error(error);
                showStatus('Connection failed: ' + error.message, 'error');
            }
        }

        async function loadNFTs(address) {
            const loading = document.getElementById('loading');
            const nftGrid = document.getElementById('nftGrid');
            const emptyState = document.getElementById('emptyState');
            
            loading.classList.remove('hidden');
            nftGrid.innerHTML = '';
            emptyState.classList.add('hidden');

            try {
                const count = await contract.ownerNFTCount(address);
                const countNum = Number(count);
                
                if (countNum === 0) {
                    loading.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    return;
                }

                const nftPromises = [];
                for (let i = 0; i < countNum; i++) {
                    nftPromises.push(fetchNFTData(address, i));
                }

                const nfts = await Promise.all(nftPromises);
                
                // Deduplicate NFTs by ID to prevent any rendering duplicates
                const uniqueNfts = [];
                const seenIds = new Set();
                nfts.forEach(nft => {
                    if (nft && !seenIds.has(nft.id)) {
                        seenIds.add(nft.id);
                        uniqueNfts.push(nft);
                    }
                });
                
                loading.classList.add('hidden');
                renderNFTs(uniqueNfts);

            } catch (error) {
                console.error(error);
                loading.classList.add('hidden');
                showStatus('Failed to read NFT data: ' + error.message, 'error');
            }
        }

        async function fetchNFTData(address, index) {
            try {
                const [nftId, seed] = await contract.ownerNFT(address, index);
                const uri = await contract.tokenURI(nftId);
                
                const base64Data = uri.replace('data:application/json;base64,', '');
                const jsonString = atob(base64Data);
                const metadata = JSON.parse(jsonString);

                // Deduplicate attributes by trait_type just in case
                const uniqueAttributes = [];
                const seenTraits = new Set();
                (metadata.attributes || []).forEach(attr => {
                    if (!seenTraits.has(attr.trait_type)) {
                        seenTraits.add(attr.trait_type);
                        uniqueAttributes.push(attr);
                    }
                });

                return {
                    id: Number(nftId),
                    seed: seed.toString(),
                    name: metadata.name,
                    image: metadata.image,
                    attributes: uniqueAttributes
                };
            } catch (err) {
                console.error(`Error fetching NFT at index ${index}:`, err);
                return null;
            }
        }

        function renderNFTs(nfts) {
            const nftGrid = document.getElementById('nftGrid');
            
            nfts.forEach(nft => {
                if (!nft) return;

                const card = document.createElement('div');
                card.className = 'nft-card rounded-xl overflow-hidden flex flex-col';
                
                const attributesHtml = nft.attributes.map(attr => `
                    <div class="bg-slate-800/50 rounded p-2 text-center border border-slate-700">
                        <p class="text-xs text-slate-400 uppercase tracking-wider">${attr.trait_type}</p>
                        <p class="text-sm font-semibold text-blue-300 truncate" title="${attr.value}">${attr.value}</p>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="aspect-square bg-slate-800 flex items-center justify-center p-4 relative group">
                        <img src="${nft.image}" alt="${nft.name}" class="max-w-full max-h-full object-contain rounded-lg shadow-lg group-hover:scale-105 transition-transform duration-300">
                        <div class="absolute top-2 right-2 bg-black/60 backdrop-blur-sm px-2 py-1 rounded text-xs font-mono text-slate-300">
                            ID: #${nft.id}
                        </div>
                    </div>
                    <div class="p-4 flex-grow flex flex-col">
                        <h3 class="text-lg font-bold text-white mb-1 truncate">${nft.name}</h3>
                        <p class="text-xs text-slate-500 font-mono mb-4 truncate" title="Seed: ${nft.seed}">Seed: ${nft.seed.slice(0, 10)}...</p>
                        
                        <div class="grid grid-cols-2 gap-2 mt-auto">
                            ${attributesHtml}
                        </div>
                    </div>
                `;
                
                nftGrid.appendChild(card);
            });
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            const statusText = document.getElementById('statusText');
            statusText.innerText = message;
            statusDiv.classList.remove('hidden', 'bg-red-900/30', 'border-red-700', 'text-red-200', 'bg-blue-900/30', 'border-blue-700', 'text-blue-200');
            
            if (type === 'error') {
                statusDiv.classList.add('bg-red-900/30', 'border-red-700', 'text-red-200');
            } else {
                statusDiv.classList.add('bg-blue-900/30', 'border-blue-700', 'text-blue-200');
            }
        }

        function hideStatus() {
            document.getElementById('statusMessage').classList.add('hidden');
        }

        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length > 0) {
                    connectWallet();
                } else {
                    location.reload();
                }
            });
            
            window.ethereum.on('chainChanged', () => {
                location.reload();
            });
        }
    </script>
</body>
</html>
